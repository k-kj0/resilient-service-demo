<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Status Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 0.9rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
    .card { background: #1e2130; border-radius: 12px; padding: 24px; border: 1px solid #2d3148; }
    .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; color: #fff; }
    .card-value.green { color: #4ade80; }
    .card-value.yellow { color: #facc15; }
    .card-value.red { color: #f87171; }
    .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .log { margin-top: 40px; width: 100%; max-width: 800px; background: #1e2130; border-radius: 12px; padding: 20px; border: 1px solid #2d3148; }
    .log h2 { font-size: 1rem; margin-bottom: 12px; color: #94a3b8; }
    .log-entry { font-size: 0.8rem; color: #64748b; border-top: 1px solid #2d3148; padding: 6px 0; font-family: monospace; }
    .updated { font-size: 0.75rem; color: #4a5568; margin-top: 20px; }
  </style>
</head>
<body>
  <h1><span class="pulse"></span>Service Status</h1>
  <p class="subtitle">resilient-demo · auto-refreshes every 5s</p>

  <div class="cards">
    <div class="card">
      <div class="card-label">Status</div>
      <div class="card-value green" id="status">—</div>
    </div>
    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value" id="uptime">—</div>
    </div>
    <div class="card">
      <div class="card-label">Restarts</div>
      <div class="card-value" id="restarts">—</div>
    </div>
    <div class="card">
      <div class="card-label">Last checked</div>
      <div class="card-value" id="ts" style="font-size:1rem">—</div>
    </div>
  </div>

  <div class="log">
    <h2>Incident Log</h2>
    <div id="log-entries"><div class="log-entry">No incidents recorded.</div></div>
  </div>

  <p class="updated" id="updated">Fetching...</p>

  <script>
    async function refresh() {
      try {
        const h = await fetch("/health").then(r => r.json());
        document.getElementById("status").textContent = h.status.toUpperCase();
        document.getElementById("uptime").textContent = h.uptime_seconds + "s";
        document.getElementById("restarts").textContent = h.restarts;
        document.getElementById("ts").textContent = new Date(h.timestamp).toLocaleTimeString();

        const i = await fetch("/incidents").then(r => r.json());
        const box = document.getElementById("log-entries");
        if (i.incidents.length === 0) {
          box.innerHTML = '<div class="log-entry">No incidents recorded.</div>';
        } else {
          box.innerHTML = i.incidents.map(e =>
            `<div class="log-entry">[${e.time}] ${e.event}</div>`
          ).join("");
        }
        document.getElementById("updated").textContent = "Last updated: " + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById("status").textContent = "UNREACHABLE";
        document.getElementById("status").className = "card-value red";
      }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
